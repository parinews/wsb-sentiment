name: WSB Daily Sentiment Email

on:
  workflow_dispatch:        # manual run (always sends, ignores the time gate)
  schedule:
    # GitHub cron is UTC and does not follow DST, so we fire at both UTC times
    # that can correspond to 8:30 AM ET. The time gate below lets exactly one
    # through per day (whichever matches the current ET offset).
    - cron: "30 12 * * *"   # 08:30 ET during EDT (summer)
    - cron: "30 13 * * *"   # 08:30 ET during EST (winter)

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Gate on 8:30 AM ET
        id: gate
        run: |
          python - <<'EOF'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/New_York"))
          manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          send = manual or now.hour == 8
          print(f"ET now: {now.isoformat()}  manual={manual}  send={send}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"send={'true' if send else 'false'}\n")
          EOF

      - name: Run WSB sentiment email
        if: steps.gate.outputs.send == 'true'
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py
